<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  --bg:#14101a;
  --card:#221c2c;
  --card-hover:#2a2335;
  --border:rgba(245,241,236,0.10);
  --text:#f5f1ec;
  --text-muted:#a79fb0;
  --text-faint:#6f6779;
  --warm:#ff4d6d;
  --cool:#6e7eff;
  --warm-soft:rgba(255,77,109,0.14);
  --cool-soft:rgba(110,126,255,0.14);
  --radius-sm:12px;
}
*,*::before,*::after{box-sizing:border-box;}

#zsa-root{
  position:relative;
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 8%, var(--warm-soft), transparent 45%),
    radial-gradient(circle at 88% 92%, var(--cool-soft), transparent 45%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  padding:clamp(24px,5vw,56px) clamp(18px,6vw,32px) 48px;
  overflow-x:hidden;
}
#zsa-root *{ font-family:inherit; }

.zsa-wordmark{
  font-family:'Space Mono',monospace;
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--text-muted);
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-bottom:clamp(26px,6vw,46px);
}
.zsa-wordmark b{ color:var(--text); font-weight:700; letter-spacing:.14em; }

.zsa-screen{ max-width:560px; margin:0 auto; animation:zsaRise .5s ease both; }
@keyframes zsaRise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }

/* hero */
.zsa-hero-dots{ display:flex; gap:10px; margin-bottom:26px; }
.zsa-hero-dot{ width:32px; height:32px; border-radius:50%; animation:zsaFloat 4s ease-in-out infinite; }
.zsa-hero-dot:nth-child(1){ background:linear-gradient(135deg,#ff9466,#ffd166); animation-delay:0s; }
.zsa-hero-dot:nth-child(2){ background:linear-gradient(135deg,#8ec5fc,#e0c3fc); animation-delay:.3s; }
.zsa-hero-dot:nth-child(3){ background:linear-gradient(135deg,#c0392b,#e67e22); animation-delay:.6s; }
.zsa-hero-dot:nth-child(4){ background:linear-gradient(135deg,#2c3e93,#6e7eff); animation-delay:.9s; }
@keyframes zsaFloat{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }

.zsa-hero h1{
  font-family:'Unbounded',sans-serif; font-weight:800;
  font-size:clamp(32px,7vw,50px); line-height:1.05; letter-spacing:-.01em;
  margin:0 0 16px;
}
.zsa-hero h1 span{
  background:linear-gradient(120deg,var(--warm),var(--cool));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.zsa-hero p{ color:var(--text-muted); font-size:16px; line-height:1.6; max-width:440px; margin:0 0 32px; }

/* buttons */
.zsa-btn{
  font-weight:600; font-size:15px; padding:14px 28px; border-radius:100px; border:none;
  cursor:pointer; background:linear-gradient(120deg,var(--warm),var(--cool)); color:#100c16;
  transition:transform .15s ease, box-shadow .15s ease;
}
.zsa-btn:hover{ transform:translateY(-2px); box-shadow:0 8px 24px rgba(110,126,255,.25); }
.zsa-btn:active{ transform:translateY(0); }

/* progress ring */
.zsa-ring{ position:relative; width:100px; height:100px; margin:0 0 6px; }
.zsa-ring-dot{
  position:absolute; width:13px; height:13px; border-radius:50%;
  background:var(--card); border:2px solid var(--border);
  transform:translate(-50%,-50%);
  transition:background .3s ease, border-color .3s ease, transform .3s ease;
}
.zsa-ring-dot.filled{ background:linear-gradient(120deg,var(--warm),var(--cool)); border-color:transparent; }
.zsa-ring-dot.active{ transform:translate(-50%,-50%) scale(1.4); }
.zsa-ring.spin .zsa-ring-dot{ animation:zsaPulse 1.2s ease-in-out infinite; }
.zsa-ring.spin .zsa-ring-dot:nth-child(1){animation-delay:0s}
.zsa-ring.spin .zsa-ring-dot:nth-child(2){animation-delay:.12s}
.zsa-ring.spin .zsa-ring-dot:nth-child(3){animation-delay:.24s}
.zsa-ring.spin .zsa-ring-dot:nth-child(4){animation-delay:.36s}
.zsa-ring.spin .zsa-ring-dot:nth-child(5){animation-delay:.48s}
.zsa-ring.spin .zsa-ring-dot:nth-child(6){animation-delay:.6s}
@keyframes zsaPulse{ 0%,100%{opacity:.35;} 50%{opacity:1;} }

.zsa-step-label{
  font-family:'Space Mono',monospace; font-size:12px; color:var(--text-faint);
  letter-spacing:.1em; text-transform:uppercase; margin-bottom:30px;
}

/* quiz */
.zsa-q-eyebrow{ font-family:'Space Mono',monospace; font-size:12px; color:var(--cool); letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px; }
.zsa-q-title{ font-family:'Unbounded',sans-serif; font-weight:600; font-size:clamp(21px,4.4vw,27px); line-height:1.28; margin:0 0 8px; }
.zsa-q-hint{ color:var(--text-muted); font-size:14px; margin:0 0 26px; line-height:1.5; }

.zsa-options{ display:flex; flex-direction:column; gap:10px; }
.zsa-option{
  text-align:left; padding:15px 18px; border-radius:var(--radius-sm);
  background:var(--card); border:1px solid var(--border); color:var(--text);
  font-size:15px; font-weight:500; cursor:pointer;
  transition:border-color .2s ease, background .2s ease, transform .15s ease;
}
.zsa-option:hover{ border-color:var(--cool); background:var(--card-hover); transform:translateX(3px); }

.zsa-quiz-nav{ margin-top:26px; }
.zsa-back{ background:none; border:none; color:var(--text-faint); font-size:14px; cursor:pointer; padding:6px 0; }
.zsa-back:hover{ color:var(--text); }
.zsa-back[disabled]{ visibility:hidden; }

/* loading */
.zsa-loading-wrap{ text-align:center; padding:50px 0 30px; }
.zsa-loading-wrap .zsa-ring{ margin:0 auto 24px; }
.zsa-loading-msg{ color:var(--text-muted); font-size:15px; min-height:22px; }

/* result */
.zsa-eyebrow{ font-family:'Space Mono',monospace; font-size:12px; color:var(--text-faint); letter-spacing:.14em; text-transform:uppercase; margin-bottom:10px; }
.zsa-season{
  font-family:'Unbounded',sans-serif; font-weight:800; font-size:clamp(30px,7vw,46px); line-height:1.06; margin:0 0 14px;
  background:linear-gradient(120deg,var(--warm),var(--cool)); -webkit-background-clip:text; background-clip:text; color:transparent;
}
.zsa-hook{ font-size:18px; font-weight:600; margin:0 0 14px; }
.zsa-why{ color:var(--text-muted); line-height:1.65; margin:0 0 34px; font-size:15px; }

.zsa-section-label{ font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); margin:0 0 14px; }

.zsa-swatch-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:32px; }
.zsa-swatch{ border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); cursor:pointer; background:var(--card); transition:transform .15s ease; }
.zsa-swatch:hover{ transform:translateY(-2px); }
.zsa-swatch-color{ height:60px; }
.zsa-swatch-info{ padding:8px 10px; }
.zsa-swatch-name{ font-size:12px; font-weight:600; line-height:1.3; }
.zsa-swatch-hex{ font-family:'Space Mono',monospace; font-size:10.5px; color:var(--text-faint); margin-top:2px; }

.zsa-avoid-row{ display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.zsa-avoid-chip{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); padding:6px 12px 6px 6px; border-radius:100px; font-size:12.5px; color:var(--text-muted); }
.zsa-avoid-dot{ width:18px; height:18px; border-radius:50%; flex-shrink:0; }
.zsa-avoid-caption{ color:var(--text-faint); font-size:12.5px; margin:0 0 34px; }

.zsa-outfits{ display:flex; flex-direction:column; gap:12px; margin-bottom:30px; }
.zsa-outfit-card{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:17px 19px; }
.zsa-outfit-num{ font-family:'Space Mono',monospace; font-size:11px; color:var(--warm); letter-spacing:.1em; margin-bottom:7px; display:block; }
.zsa-outfit-text{ font-size:14.5px; line-height:1.55; margin:0; }

.zsa-tip{ background:var(--cool-soft); border:1px solid rgba(110,126,255,.3); border-radius:var(--radius-sm); padding:16px 18px; margin-bottom:34px; font-size:14px; line-height:1.55; }
.zsa-tip b{ color:var(--cool); display:block; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }

.zsa-result-actions{ margin-bottom:36px; }
.zsa-footer{ border-top:1px solid var(--border); padding-top:18px; font-size:12px; color:var(--text-faint); line-height:1.6; }
.zsa-footer b{ color:var(--text-muted); }

.zsa-toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(6px);
  background:var(--text); color:var(--bg); padding:10px 18px; border-radius:100px;
  font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
  z-index:10;
}
.zsa-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* error */
.zsa-error-box{ background:var(--card); border:1px solid rgba(255,77,109,.35); border-radius:var(--radius-sm); padding:20px 22px; margin-bottom:22px; }
.zsa-error-box p{ margin:0 0 6px; font-size:14.5px; line-height:1.55; }
.zsa-err-detail{ color:var(--text-faint); font-size:12px; font-family:'Space Mono',monospace; word-break:break-word; }

@media (max-width:480px){
  .zsa-swatch-grid{ grid-template-columns:repeat(2,1fr); }
}
@media (prefers-reduced-motion: reduce){
  #zsa-root *{ animation-duration:.001s !important; animation-iteration-count:1 !important; transition-duration:.001s !important; }
}
#zsa-root :focus-visible{ outline:2px solid var(--cool); outline-offset:3px; border-radius:4px; }
</style>

<div id="zsa-root"></div>

<script>
(function(){
  var QUESTIONS = [
    { id:'undertone', eyebrow:'Q1 / 6', title:"Gold or silver \u2014 which one actually looks better on you?",
      hint:"Not sure? Check the veins on the inside of your wrist in daylight: greenish = warm, blueish = cool.",
      options:[
        {label:'Gold, easily', value:'warm undertone'},
        {label:'Silver, easily', value:'cool undertone'},
        {label:'Honestly, both work', value:'neutral undertone'},
        {label:'No clue', value:'unsure undertone'}
      ]},
    { id:'hair', eyebrow:'Q2 / 6', title:"What's your natural hair colour?",
      options:[
        {label:'Black', value:'black hair'},
        {label:'Dark brown', value:'dark brown hair'},
        {label:'Medium or light brown', value:'light brown hair'},
        {label:'Red or auburn', value:'red or auburn hair'},
        {label:'Blonde', value:'blonde hair'},
        {label:'Grey or silver', value:'grey hair'}
      ]},
    { id:'eyes', eyebrow:'Q3 / 6', title:'Eye colour?',
      options:[
        {label:'Deep brown or black', value:'dark brown eyes'},
        {label:'Light brown or hazel', value:'hazel eyes'},
        {label:'Green', value:'green eyes'},
        {label:'Blue or grey', value:'blue-grey eyes'}
      ]},
    { id:'contrast', eyebrow:'Q4 / 6', title:'Old photo test \u2014 do your hair, skin and eyes look really different from each other, or fairly close?',
      options:[
        {label:'Big contrast between them', value:'high contrast between features'},
        {label:'Somewhere in the middle', value:'medium contrast between features'},
        {label:'They blend pretty softly', value:'low contrast between features'}
      ]},
    { id:'vibe', eyebrow:'Q5 / 6', title:"Pick the fit that's most you right now",
      options:[
        {label:'Streetwear', value:'streetwear'},
        {label:'Clean and minimal', value:'minimal'},
        {label:'Loud and maximalist', value:'maximalist'},
        {label:'Old money, classic', value:'classic'},
        {label:'Y2K and playful', value:'y2k'}
      ]},
    { id:'occasion', eyebrow:'Q6 / 6', title:'What are we dressing you for?',
      options:[
        {label:'Everyday', value:'everyday'},
        {label:'College or work', value:'college or work'},
        {label:'Festive or ethnic', value:'festive or ethnic occasions'},
        {label:'A night out', value:'a night out'}
      ]}
  ];

  var state = { screen:'hero', step:0, answers:{}, result:null, errorMsg:null };
  var loadingTimer = null;
  var root = document.getElementById('zsa-root');

  function el(tag, attrs, children){
    attrs = attrs || {}; children = children || [];
    var e = document.createElement(tag);
    for(var k in attrs){
      var v = attrs[k];
      if(v===null || v===undefined) continue;
      if(k==='class'){ e.className = v; }
      else if(k.indexOf('on')===0 && typeof v==='function'){ e.addEventListener(k.slice(2), v); }
      else { e.setAttribute(k, v); }
    }
    if(!Array.isArray(children)) children=[children];
    children.forEach(function(c){
      if(c===null || c===undefined) return;
      e.appendChild(typeof c==='string' ? document.createTextNode(c) : c);
    });
    return e;
  }

  function wordmark(){
    return el('div',{class:'zsa-wordmark'},[ el('b',{},'ZENITH'), 'style assistant' ]);
  }

  function ring(filledCount, activeIndex, spin){
    var wrap = el('div',{class:'zsa-ring'+(spin?' spin':'')});
    var size=100, r=41, cx=size/2, cy=size/2;
    for(var i=0;i<6;i++){
      var angle = (i/6)*2*Math.PI - Math.PI/2;
      var x = cx + r*Math.cos(angle);
      var y = cy + r*Math.sin(angle);
      var cls = 'zsa-ring-dot'+(i<filledCount?' filled':'')+(i===activeIndex?' active':'');
      wrap.appendChild(el('div',{class:cls, style:'left:'+x+'px; top:'+y+'px;'}));
    }
    return wrap;
  }

  function render(){
    root.innerHTML = '';
    if(state.screen==='hero') renderHero();
    else if(state.screen==='quiz') renderQuiz();
    else if(state.screen==='loading') renderLoading();
    else if(state.screen==='result') renderResult();
    else if(state.screen==='error') renderError();
  }

  function renderHero(){
    var s = el('div',{class:'zsa-screen zsa-hero'});
    s.appendChild(wordmark());
    s.appendChild(el('div',{class:'zsa-hero-dots'},[
      el('div',{class:'zsa-hero-dot'}), el('div',{class:'zsa-hero-dot'}),
      el('div',{class:'zsa-hero-dot'}), el('div',{class:'zsa-hero-dot'})
    ]));
    s.appendChild(el('h1',{},[ 'Find your ', el('span',{},'colour season'), ' in six taps.' ]));
    s.appendChild(el('p',{},"Six quick questions. Zenith's colour analysis and styling AI work together to hand you a real palette and three outfit ideas built for how you actually dress."));
    s.appendChild(el('button',{class:'zsa-btn', onclick:startQuiz},'Start the quiz'));
    root.appendChild(s);
  }

  function startQuiz(){ state.screen='quiz'; state.step=0; state.answers={}; render(); }

  function renderQuiz(){
    var q = QUESTIONS[state.step];
    var s = el('div',{class:'zsa-screen'});
    s.appendChild(wordmark());
    s.appendChild(ring(state.step, state.step, false));
    s.appendChild(el('div',{class:'zsa-step-label'}, q.eyebrow));
    s.appendChild(el('div',{class:'zsa-q-eyebrow'},'this one shapes your palette'));
    s.appendChild(el('h2',{class:'zsa-q-title'}, q.title));
    if(q.hint) s.appendChild(el('p',{class:'zsa-q-hint'}, q.hint));
    var opts = el('div',{class:'zsa-options'});
    q.options.forEach(function(o){
      opts.appendChild(el('button',{class:'zsa-option', onclick:function(){ selectOption(q.id, o.value); }}, o.label));
    });
    s.appendChild(opts);
    var nav = el('div',{class:'zsa-quiz-nav'});
    nav.appendChild(el('button',{class:'zsa-back', disabled: state.step===0 ? 'true' : null, onclick:goBack}, '\u2190 Back'));
    s.appendChild(nav);
    root.appendChild(s);
  }

  function selectOption(id, value){
    state.answers[id] = value;
    if(state.step < QUESTIONS.length-1){ state.step++; render(); }
    else { submitQuiz(); }
  }

  function goBack(){ if(state.step>0){ state.step--; render(); } }

  function renderLoading(){
    var s = el('div',{class:'zsa-screen zsa-loading-wrap'});
    s.appendChild(wordmark());
    s.appendChild(ring(6,-1,true));
    var msgs = ['Reading your undertone\u2026','Cross-checking hair, eyes and contrast\u2026','Matching you to a season\u2026','Building your palette\u2026','Styling three looks\u2026'];
    var msgEl = el('p',{class:'zsa-loading-msg','aria-live':'polite'}, msgs[0]);
    s.appendChild(msgEl);
    root.appendChild(s);
    var i=0;
    loadingTimer = setInterval(function(){ i=(i+1)%msgs.length; msgEl.textContent = msgs[i]; }, 1100);
  }

  function buildPrompt(){
    var sys = 'You are Zenith Style Assistant \u2014 the in-house AI stylist for Zenith, a Gen-Z fashion and culture brand in India. You combine two of Zenith\'s systems in a single flow: seasonal colour analysis and personalised outfit styling.\n\n' +
      'TASK\n' +
      '1. Determine the user\'s colour season using the 12-season seasonal colour analysis framework (choose the closest of: Light Spring, True Spring, Bright Spring, Light Summer, True Summer, Soft Summer, Soft Autumn, True Autumn, Deep Autumn, Deep Winter, True Winter, Bright Winter). If undertone reads as "unsure", infer your best judgement from hair, eyes and contrast, and mention that gently inside "why" \u2014 never refuse or ask a follow-up question.\n' +
      '2. Build a palette of exactly 6 best colours and exactly 3 colours to avoid, as real hex codes grounded in that season\'s actual depth, warmth and clarity.\n' +
      '3. Write exactly 3 outfit ideas that fit the person\'s style vibe AND occasion AND colour palette \u2014 concrete pieces and colours, not vague advice.\n' +
      '4. Write in Zenith\'s voice: confident, warm, a little playful, like a stylish older sibling texting a friend. Never clinical, never a beauty-industry lecture.\n\n' +
      'RULES\n' +
      '- Never call a colour or the person\'s features "bad", "unflattering" or "ugly". Frame the 3 colours-to-avoid constructively \u2014 e.g. "save this one for a bag or shoes, not head to toe" \u2014 never as a failure.\n' +
      '- Keep it tight. This is a fast, fun reveal, not a dissertation.\n' +
      '- If answers feel sparse or contradictory, make a confident call anyway.\n' +
      '- Respond with ONLY valid JSON. No markdown code fences, no text outside the JSON object. Match this exact shape:\n' +
      '{"season":"string","hook":"string, under 12 words, said directly to the user","why":"string, 2-3 sentences, reference their actual answers","best_colors":[{"name":"string","hex":"#RRGGBB"}],"avoid_colors":[{"name":"string","hex":"#RRGGBB"}],"outfit_ideas":["string","string","string"],"styling_tip":"string"}\n' +
      'best_colors must contain exactly 6 items. avoid_colors must contain exactly 3 items. outfit_ideas must contain exactly 3 items.';

    var answerLines = QUESTIONS.map(function(q){ return q.id + ': ' + state.answers[q.id]; }).join('\n');
    return sys + '\n\n---\nUSER\'S ANSWERS:\n' + answerLines + '\n\nReturn the JSON now.';
  }

  function submitQuiz(){
    state.screen = 'loading'; render();
    fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{ role:'user', content: buildPrompt() }]
      })
    })
    .then(function(response){ return response.json(); })
    .then(function(data){
      if(data.error){ throw new Error(data.error.message || 'The API returned an error.'); }
      var textBlock = (data.content||[]).map(function(b){ return b.text || ''; }).join('\n').trim();
      var clean = textBlock.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
      var parsed = JSON.parse(clean);
      if(!parsed.season || !Array.isArray(parsed.best_colors) || parsed.best_colors.length<1){
        throw new Error('Response was missing expected fields.');
      }
      clearInterval(loadingTimer);
      state.result = parsed;
      state.screen = 'result';
      render();
    })
    .catch(function(err){
      clearInterval(loadingTimer);
      state.errorMsg = (err && err.message) ? err.message : 'Something went wrong reaching the styling engine.';
      state.screen = 'error';
      render();
    });
  }

  function renderError(){
    var s = el('div',{class:'zsa-screen'});
    s.appendChild(wordmark());
    var box = el('div',{class:'zsa-error-box'});
    box.appendChild(el('p',{}, "Couldn't reach the styling engine."));
    box.appendChild(el('p',{class:'zsa-err-detail'}, state.errorMsg || ''));
    s.appendChild(box);
    s.appendChild(el('button',{class:'zsa-btn', onclick:submitQuiz}, 'Try again'));
    root.appendChild(s);
  }

  function showToast(msg){
    var t = root.querySelector('.zsa-toast');
    if(!t){ t = el('div',{class:'zsa-toast'}); root.appendChild(t); }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._hideTimer);
    t._hideTimer = setTimeout(function(){ t.classList.remove('show'); }, 1400);
  }

  function copyHex(hex){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(hex).then(function(){ showToast(hex+' copied'); }).catch(function(){ showToast(hex); });
    } else {
      showToast(hex);
    }
  }

  function renderResult(){
    var r = state.result;
    var s = el('div',{class:'zsa-screen'});
    s.appendChild(wordmark());
    s.appendChild(el('div',{class:'zsa-eyebrow'},'Your season'));
    s.appendChild(el('div',{class:'zsa-season'}, r.season || ''));
    if(r.hook) s.appendChild(el('p',{class:'zsa-hook'}, r.hook));
    if(r.why) s.appendChild(el('p',{class:'zsa-why'}, r.why));

    s.appendChild(el('div',{class:'zsa-section-label'},'Your palette \u2014 tap a swatch to copy the hex'));
    var grid = el('div',{class:'zsa-swatch-grid'});
    (r.best_colors||[]).forEach(function(c){
      var sw = el('div',{class:'zsa-swatch', title:'Click to copy '+c.hex, onclick:function(){ copyHex(c.hex); }});
      sw.appendChild(el('div',{class:'zsa-swatch-color', style:'background:'+c.hex}));
      var info = el('div',{class:'zsa-swatch-info'});
      info.appendChild(el('div',{class:'zsa-swatch-name'}, c.name || ''));
      info.appendChild(el('div',{class:'zsa-swatch-hex'}, (c.hex||'').toUpperCase()));
      sw.appendChild(info);
      grid.appendChild(sw);
    });
    s.appendChild(grid);

    s.appendChild(el('div',{class:'zsa-section-label'},'Save these for accessories, not head-to-toe'));
    var avoidRow = el('div',{class:'zsa-avoid-row'});
    (r.avoid_colors||[]).forEach(function(c){
      var chip = el('div',{class:'zsa-avoid-chip'});
      chip.appendChild(el('div',{class:'zsa-avoid-dot', style:'background:'+c.hex}));
      chip.appendChild(document.createTextNode(c.name||''));
      avoidRow.appendChild(chip);
    });
    s.appendChild(avoidRow);

    s.appendChild(el('div',{class:'zsa-section-label', style:'margin-top:30px;'},'Three looks for you'));
    var outfits = el('div',{class:'zsa-outfits'});
    (r.outfit_ideas||[]).forEach(function(o,i){
      var card = el('div',{class:'zsa-outfit-card'});
      card.appendChild(el('span',{class:'zsa-outfit-num'}, 'LOOK 0'+(i+1)));
      card.appendChild(el('p',{class:'zsa-outfit-text'}, o));
      outfits.appendChild(card);
    });
    s.appendChild(outfits);

    if(r.styling_tip){
      var tip = el('div',{class:'zsa-tip'});
      tip.appendChild(el('b',{},'Styling tip'));
      tip.appendChild(document.createTextNode(r.styling_tip));
      s.appendChild(tip);
    }

    var actions = el('div',{class:'zsa-result-actions'});
    actions.appendChild(el('button',{class:'zsa-btn', onclick:startQuiz},'Take it again'));
    s.appendChild(actions);

    var footer = el('div',{class:'zsa-footer'});
    footer.appendChild(document.createTextNode('Prototype build \u2014 merges Zenith\'s '));
    footer.appendChild(el('b',{},'Colour Analysis AI'));
    footer.appendChild(document.createTextNode(' and '));
    footer.appendChild(el('b',{},'Zenith Fashion AI'));
    footer.appendChild(document.createTextNode(' into one flow, live on the Claude API. Prompt-engineering sample.'));
    s.appendChild(footer);

    root.appendChild(s);
  }

  render();
})();
</script>
